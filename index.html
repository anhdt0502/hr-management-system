<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>HR Management System</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container">
  <img src="/img/logo.jpg" id="logo">

  <audio id="bgMusic" loop>
    <source src="music/music.mp3" type="audio/mpeg">
  </audio>

  <button onclick="toggleMusic()" id="musicBtn" style="position:fixed; top:20px; right:20px;">
    🔇
  </button>

  <h1>HR Management System</h1>
  <br><br>
  <div id="topUser"></div>  <div id="top3"></div>
  <!-- ===== SEARCH ===== -->
  <div class="search-box">
    <input id="search" placeholder="Tìm kiếm..." oninput="handleSearch()">
  </div>

  <!-- ===== FORM ===== -->
  <h3>Thêm / Sửa nhân sự</h3>
  <div class="form-group">
    <input id="id" placeholder="ID nhân sự (vd: HR001)">
    <input id="kpi" placeholder="KPI (VND)">
  </div>
  <div class="form-group">
    <input id="name" placeholder="Họ tên">
    <input id="phone" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Số điện thoại">
  </div>

  <div class="form-group">
    <input id="address" placeholder="Địa chỉ">
    <input id="bank" placeholder="Số tài khoản">
  </div>

  <div class="form-group">
    <input id="joinDate" type="date">
    <input id="avatar" placeholder="Tên ảnh (vd: 1.jpg)">
  </div>

  <br>
  <div id="kpiSummary" style="margin:10px 0; font-weight:bold;"></div>

  <button onclick="showKpiModal()">Xem nhân viên đạt KPI</button><br><br>
  <br><br>
  <button onclick="addUser()">Thêm nhân sự</button>
  <button onclick="updateUser()">Update</button>
  <button onclick="reloadSystem()">Reload</button>
  <button onclick="resetSystem()">Resert</button>
  <br><br>




  <!-- ===== TABLE ===== -->
  <div id="table"></div>
</div>


<script src="./src/user.js"></script>
<script src="./src/data.js"></script>
<script src="./src/system.js"></script>
<script src="./src/kpi.js"></script>
<script src="./src/main.js"></script>


<div id="toast"></div>
<div id="kpiModal" style="display:none;">
  <div id="modalContent">
    <h3>Nhân viên đạt KPI</h3>
    <div id="kpiList"></div>
    <button onclick="closeKpiModal()">Đóng</button>
  </div>

</div>
</body>
</html>
